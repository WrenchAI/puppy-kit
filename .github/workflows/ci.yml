name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras

#      - name: Check formatting
#        run: uv run ruff format --check puppy_kit/ tests/
#
#      - name: Lint
#        run: uv run ruff check puppy_kit/ tests/

      - name: Test
        run: uv run pytest tests/ -v --cov=puppy_kit --cov-report=xml
