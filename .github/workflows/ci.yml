name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --all-extras

#      - name: Check formatting
#        run: uv run ruff format --check puppy_kit/ tests/
#
#      - name: Lint
#        run: uv run ruff check puppy_kit/ tests/

      - name: Test
        run: uv run pytest tests/ -v -m "not integration" --cov=puppy_kit --cov-report=xml
