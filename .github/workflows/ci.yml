name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Check formatting
        run: uv run ruff format --check puppy_kit/ tests/

      - name: Lint
        run: uv run ruff check puppy_kit/ tests/

      - name: Type check changed files
        run: |
          changed=$(git diff --name-only origin/main...HEAD -- '*.py' | grep '^puppy_kit/' || true)
          if [ -n "$changed" ]; then
            echo "Checking: $changed"
            uv run ty check $changed
          else
            echo "No puppy_kit Python files changed, skipping."
          fi

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Test
        run: uv run pytest tests/ -v -m "not integration" --cov=puppy_kit --cov-report=xml
